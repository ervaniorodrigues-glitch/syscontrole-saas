<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Limpar Rastreamento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 87, 108, 0.6);
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .sucesso {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .erro {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Limpar Histórico de Rastreamento</h1>
        <p>
            <strong>Atenção!</strong><br>
            Esta ação irá <strong>APAGAR PERMANENTEMENTE</strong> todo o histórico de rastreamento de acessos.<br><br>
            Após a limpeza, o sistema começará a registrar do zero a partir de hoje.
        </p>
        <button onclick="limparHistorico()">Limpar Tudo e Começar do Zero</button>
        <div id="resultado" class="resultado"></div>
    </div>

    <script>
        async function limparHistorico() {
            if (!confirm('⚠️ TEM CERTEZA?\n\nTodo o histórico será APAGADO permanentemente!')) {
                return;
            }

            if (!confirm('🔴 ÚLTIMA CONFIRMAÇÃO!\n\nEsta ação não pode ser desfeita!')) {
                return;
            }

            const resultado = document.getElementById('resultado');
            resultado.style.display = 'none';

            try {
                const response = await fetch('/api/rastreamento/limpar-tudo', {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    resultado.className = 'resultado sucesso';
                    resultado.innerHTML = '✅ Histórico limpo com sucesso!<br>O sistema começará a registrar do zero.';
                    resultado.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Erro desconhecido');
                }
            } catch (error) {
                resultado.className = 'resultado erro';
                resultado.innerHTML = '❌ Erro ao limpar histórico: ' + error.message;
                resultado.style.display = 'block';
            }
        }
    </script>
</body>
</html>
